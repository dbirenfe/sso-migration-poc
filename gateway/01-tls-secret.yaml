##############################################################################
# TLS Secrets for the API Gateway
#
# Option A: Provide your own certificates (fill in base64-encoded values).
# Option B: Let OpenShift manage TLS at the Route level (edge termination)
#           and skip this file entirely.
#
# If you use Option A, the NGINX deployment mounts these secrets and
# terminates TLS itself (passthrough Routes).
##############################################################################
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-tls-rhsso
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
type: kubernetes.io/tls
data:
  tls.crt: "<BASE64_ENCODED_RHSSO_CERT_CHAIN>"
  tls.key: "<BASE64_ENCODED_RHSSO_PRIVATE_KEY>"
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-tls-rhbk
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
type: kubernetes.io/tls
data:
  tls.crt: "<BASE64_ENCODED_RHBK_CERT_CHAIN>"
  tls.key: "<BASE64_ENCODED_RHBK_PRIVATE_KEY>"

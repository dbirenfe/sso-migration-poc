##############################################################################
# Client credentials used by the proxy to perform token exchange.
# Both proxies use the same "token-exchange-client" configured on each IdP.
##############################################################################
---
apiVersion: v1
kind: Secret
metadata:
  name: token-proxy-legacy-credentials
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
    app.kubernetes.io/component: token-exchange-proxy
type: Opaque
stringData:
  EXCHANGE_CLIENT_ID: "token-exchange-client"
  EXCHANGE_CLIENT_SECRET: "token-exchange-secret-12345"
---
apiVersion: v1
kind: Secret
metadata:
  name: token-proxy-migrated-credentials
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
    app.kubernetes.io/component: token-exchange-proxy
type: Opaque
stringData:
  EXCHANGE_CLIENT_ID: "token-exchange-client"
  EXCHANGE_CLIENT_SECRET: "token-exchange-secret-12345"

##############################################################################
# Proxy in front of RH-SSO — exchanges RHBK tokens to RH-SSO tokens.
##############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-proxy-rhsso
  namespace: sso-gateway
  labels:
    app: idp-proxy-rhsso
    app.kubernetes.io/part-of: sso-migration
    app.kubernetes.io/component: token-exchange-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idp-proxy-rhsso
  template:
    metadata:
      labels:
        app: idp-proxy-rhsso
        app.kubernetes.io/part-of: sso-migration
        app.kubernetes.io/component: token-exchange-proxy
    spec:
      containers:
        - name: proxy
          image: image-registry.openshift-image-registry.svc:5000/sso-gateway/token-exchange-proxy:latest
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: idp-proxy-rhsso-config
            - secretRef:
                name: idp-proxy-rhsso-credentials
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      restartPolicy: Always
---
##############################################################################

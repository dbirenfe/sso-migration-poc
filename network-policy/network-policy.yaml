##############################################################################
# Network Policies for the SSO Gateway namespace (ingress controls).
#
# These policies enforce which traffic is allowed INTO the namespace.
# Egress is left unrestricted for the POC to avoid DNS resolution issues.
# For production, add egress policies that allow DNS (port 5353) and IdP
# communication (port 8443 to labeled namespaces).
#
# Prerequisites:
#   oc label namespace rhsso        sso-migration/idp=true
#   oc label namespace rhbk         sso-migration/idp=true
#   oc label namespace sso-gateway  sso-migration/access=true
##############################################################################

# ─── Allow ingress from OpenShift Router to IdP Proxy pods ─────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-router-to-proxy
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: token-exchange-proxy
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - port: 8080
          protocol: TCP

# ─── Allow intra-namespace traffic (demo app, etc.) ──────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP

# ─── Default deny all other ingress to the namespace ─────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: sso-gateway
  labels:
    app.kubernetes.io/part-of: sso-migration
spec:
  podSelector: {}
  policyTypes:
    - Ingress
